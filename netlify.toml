[build]
  publish = "dist"
  command = "npm run build"

# Edge Function: Bot prerendering via Prerender.io free tier
# Set PRERENDER_TOKEN in Netlify Environment Variables after signing up at https://prerender.io
[[edge_functions]]
  function = "bot-prerender"
  path = "/*"

# Proxy for Sitemap - must come before SPA fallback
[[redirects]]
  from = "/sitemap.xml"
  to = "https://hqvagogzltdyacwocjhr.supabase.co/functions/v1/sitemap"
  status = 200
  force = true

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
