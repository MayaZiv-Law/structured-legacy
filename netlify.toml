[build]
  publish = "dist"
  command = "npm run build"

# Edge Function: Sitemap
# Generates sitemap.xml dynamically on every request with today's lastmod
# date, so Google always sees the sitemap as fresh. Runs before bot-prerender
# (order matters here).
[[edge_functions]]
  function = "sitemap"
  path = "/sitemap.xml"

# Edge Function: Bot prerendering via Prerender.io free tier
# Set PRERENDER_TOKEN in Netlify Environment Variables after signing up at https://prerender.io
[[edge_functions]]
  function = "bot-prerender"
  path = "/*"

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
